<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教育视频知识图谱生成器</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="brand">
          <p class="eyebrow">动态知识图谱</p>
          <h1>教育视频推荐系统</h1>
        </section>

        <section class="panel">
          <label for="topicInput">输入学习主题</label>
          <div class="search-row">
            <input id="topicInput" type="text" value="导数" placeholder="例如：导数、极限、Python 函数" autocomplete="off" />
            <button id="generateBtn" type="button">生成</button>
          </div>
          <div class="suggestions">
            <button class="chip" type="button" data-example="导数">导数</button>
            <button class="chip" type="button" data-example="极限">极限</button>
            <button class="chip" type="button" data-example="Python 函数">Python 函数</button>
            <button class="chip" type="button" data-example="机器学习">机器学习</button>
          </div>
        </section>

        <section class="panel">
          <label for="apiEndpointInput">知识图谱生成接口</label>
          <input id="apiEndpointInput" type="text" value="/api/knowledge-graph" autocomplete="off" />
          <p class="method-text">
            API Key 由后端环境变量读取，不写入网页或 GitHub 仓库。GitHub Pages 静态页面需要另行部署后端。
          </p>
        </section>

        <section class="panel">
          <h2>生成方法</h2>
          <p class="method-text">
            当前版本要求 LLM 输出具体前置知识链，而不是“基础概念、核心定义”这类固定模板。
          </p>
        </section>

        <section class="panel">
          <h2>节点类型</h2>
          <div class="legend vertical">
            <span><i class="dot target"></i>学习目标</span>
            <span><i class="dot prerequisite"></i>前置知识</span>
            <span><i class="dot concept"></i>相关概念</span>
            <span><i class="line-sample"></i>概念关系</span>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <p class="eyebrow">生成结果</p>
            <h2 id="graphTitle">导数知识图谱</h2>
            <p id="statusText" class="status-text">等待输入学习主题。</p>
          </div>
          <button id="exportBtn" class="ghost-button" type="button">复制 JSON</button>
        </header>

        <section class="graph-layout">
          <div class="graph-card">
            <svg id="graph" role="img" aria-label="动态生成的知识图谱"></svg>
          </div>

          <aside class="inspector">
            <section class="result-block">
              <p class="eyebrow">当前节点</p>
              <h3 id="selectedConcept">导数</h3>
              <p id="selectedDescription">点击图中的节点查看说明。</p>
            </section>

            <section class="result-block">
              <h3>关系说明</h3>
              <ol id="relationList" class="path-list"></ol>
            </section>

            <section class="result-block">
              <h3>图谱数据</h3>
              <pre id="jsonPreview" class="json-preview"></pre>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
