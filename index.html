<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教育视频知识图谱</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="brand">
          <p class="eyebrow">学习知识图谱</p>
          <h1>教育视频推荐系统</h1>
        </section>

        <section class="panel">
          <label for="domainSelect">学习领域</label>
          <select id="domainSelect"></select>
        </section>

        <section class="panel">
          <label for="goalInput">学习目标</label>
          <div class="search-row">
            <input id="goalInput" type="text" placeholder="例如：导数" autocomplete="off" />
            <button id="analyzeBtn" type="button">分析</button>
          </div>
          <div id="suggestions" class="suggestions"></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>学习者掌握状态</h2>
            <button id="resetStateBtn" class="ghost-button" type="button">重置</button>
          </div>
          <div id="knowledgeState" class="state-list"></div>
        </section>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <p class="eyebrow">概念图谱</p>
            <h2 id="domainTitle">微积分基础</h2>
          </div>
          <div class="legend">
            <span><i class="dot known"></i>已掌握</span>
            <span><i class="dot weak"></i>薄弱</span>
            <span><i class="dot target"></i>目标</span>
            <span><i class="line-sample"></i>前置关系</span>
          </div>
        </header>

        <section class="graph-layout">
          <div class="graph-card">
            <svg id="graph" role="img" aria-label="知识图谱可视化"></svg>
          </div>

          <aside class="inspector">
            <section class="result-block">
              <p class="eyebrow">当前概念</p>
              <h3 id="selectedConcept">请选择一个概念</h3>
              <p id="selectedDescription">点击节点，或输入学习目标后分析。</p>
            </section>

            <section class="result-block">
              <h3>前置知识链</h3>
              <ol id="pathList" class="path-list"></ol>
            </section>

            <section class="result-block">
              <h3>诊断问题</h3>
              <div id="questionList" class="question-list"></div>
            </section>

            <section class="result-block">
              <h3>相关视频覆盖</h3>
              <div id="videoList" class="video-list"></div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <script src="./data/knowledge-graph.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
