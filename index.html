<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数学知识图谱</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="brand">
          <p class="eyebrow">数学知识图谱</p>
          <h1>教育视频推荐系统</h1>
        </section>

        <section class="panel">
          <label for="topicInput">查询数学概念</label>
          <div class="search-row">
            <input id="topicInput" type="text" value="导数" placeholder="例如：导数、极限、矩阵、概率论" autocomplete="off" />
            <button id="generateBtn" type="button">查询</button>
          </div>
          <div class="suggestions">
            <button class="chip" type="button" data-example="导数">导数</button>
            <button class="chip" type="button" data-example="极限">极限</button>
            <button class="chip" type="button" data-example="积分">积分</button>
            <button class="chip" type="button" data-example="矩阵">矩阵</button>
            <button class="chip" type="button" data-example="概率论">概率论</button>
          </div>
        </section>

        <section class="panel">
          <h2>数据来源</h2>
          <p class="method-text">
            页面直接读取项目中的数学知识库 JSON。知识库由 Neo4j Cypher 数据同步生成，覆盖小学到大学核心数学概念。
          </p>
        </section>

        <section class="panel">
          <h2>查询方式</h2>
          <p class="method-text">
            输入概念后，系统返回该概念的多层前置知识、后续可学习内容和相关概念。
          </p>
        </section>

        <section class="panel">
          <h2>节点类型</h2>
          <div class="legend vertical">
            <span><i class="dot target"></i>学习目标</span>
            <span><i class="dot prerequisite"></i>前置知识</span>
            <span><i class="dot concept"></i>相关概念</span>
            <span><i class="line-sample"></i>概念关系</span>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <p class="eyebrow">查询结果</p>
            <h2 id="graphTitle">导数数学知识图谱</h2>
            <p id="statusText" class="status-text">正在加载数学知识库。</p>
          </div>
          <button id="exportBtn" class="ghost-button" type="button">复制 JSON</button>
        </header>

        <section class="graph-layout">
          <div class="graph-card">
            <svg id="graph" role="img" aria-label="动态生成的知识图谱"></svg>
          </div>

          <aside class="inspector">
            <section class="result-block">
              <p class="eyebrow">当前节点</p>
              <h3 id="selectedConcept">导数</h3>
              <p id="selectedDescription">点击图中的节点查看说明。</p>
            </section>

            <section class="result-block">
              <h3>关系说明</h3>
              <ol id="relationList" class="path-list"></ol>
            </section>

            <section class="result-block">
              <h3>图谱数据</h3>
              <pre id="jsonPreview" class="json-preview"></pre>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <script src="./data/math-knowledge-graph.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
